services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "${ELASTICSEARCH__PORT}:${ELASTICSEARCH__PORT}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://${ELASTICSEARCH__HOST}:${ELASTICSEARCH__PORT}/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS__PORT}:${REDIS__PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build: .
    env_file:
      - .env.example
    ports:
      - "${UVICORN__PORT}:${UVICORN__PORT}"
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
