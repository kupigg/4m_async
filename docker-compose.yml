services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis-cluster:
    image: grokzen/redis-cluster:7.2.0
    environment:
      - IP=0.0.0.0
      - BIND_ADDRESS=0.0.0.0
      - INITIAL_PORT=7000
    ports:
      - "7000-7005:7000-7005"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 7000 ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build: .
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis-cluster:
        condition: service_healthy
